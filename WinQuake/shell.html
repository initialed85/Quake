<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <title>Quake</title>
    <script language="javascript">
      const onLoadOrResize = () => {
        const canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
  </head>
  <body
    onload="javascript: onLoadOrResize();"
    onresize="javascript: onLoadOrResize();"
    style="padding: 0px; margin: 0px"
  >
    <div class="emscripten_border" style="padding: 0px; margin: 0px">
      <canvas
        class="emscripten"
        id="canvas"
        oncontextmenu="event.preventDefault()"
        tabindex="-1"
        style="margin: 0px; padding: 0px"
      ></canvas>
    </div>
    <script>
      const canvasElement = document.getElementById("canvas");

      canvasElement.addEventListener("webglcontextlost", (e) => {
        alert("WebGL context lost. You will need to reload the page."), e.preventDefault();
      });

      var Module = {
        print(...e) {
          console.log(...e);
        },
        printErr(...e) {
          console.warn(...e);
        },
        canvas: canvasElement,
        // arguments: ["-width", `${window.innerWidth}`, "-height", `${window.innerHeight}`],
        arguments: ["-width", `1280`, "-height", `800`],
      };
    </script>
